<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PenPen Fight</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111;
            color: #eee;
            overflow: hidden;
            font-family: Inter, system-ui, sans-serif;
        }

        #game-container {
            width: 100%;
            height: 100%;
        }

        .ui-button {
            display: inline-block;
            padding: 12px 20px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            background: #2e7dff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .ui-button:hover {
            background: #1f5fcc;
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="scenes/BootScene.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/RoomScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="objects/Pen.js"></script>
    <script src="objects/Table.js"></script>
    <script src="managers/SocketManager.js"></script>
    <script src="managers/RoomManager.js"></script>
    <script src="managers/PlayerManager.js"></script>
    <script src="main.js"></script>
</body>

</html>
