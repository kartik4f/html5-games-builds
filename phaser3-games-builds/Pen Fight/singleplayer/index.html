<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">

    <title>Pen Fight-Schooltime</title>

    <!-- School-themed handwriting fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Patrick+Hand&display=swap"
        rel="stylesheet">

    <style>
        body {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Patrick Hand', OpenSans-Regular;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #d8c9a3;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            overflow: hidden;
            display: block;
            background-color: #d8c9a3;
        }
    </style>

</head>

<body>

    <div id="game"></div>

    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>

    <!-- Planck -->
    <script src="https://cdn.jsdelivr.net/npm/planck@1.4.2/dist/planck.min.js"></script>

    <!-- Game -->
    <script type="module" src="./js/main.js"></script>

</body>

</html>
